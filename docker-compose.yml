# App deployment example.
# MySQL is expected to already exist on an external Docker network.
#
# Prerequisites:
#   1. Ensure an external Docker network exists (set INFRA_NETWORK_NAME).
#   2. Create the application database once.
#   3. cp .env.example .env  # fill secrets; never commit real .env
#   4. docker compose up -d
#
# Usage:
#   export MAILBOX_IMAGE=registry.example.com/mailbox-service:latest
#   export INFRA_NETWORK_NAME=your_external_network
#   docker compose up -d

services:
  mailbox-service:
    image: ${MAILBOX_IMAGE:-mailbox-service:latest}
    container_name: mailbox-service
    restart: unless-stopped
    # Prefer loopback publish for local/dev; expose carefully if putting behind an external reverse proxy.
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Prefer values from .env; no real credentials are hard-coded here.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      APP_ENV: ${APP_ENV:-production}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      TLS_MODE: ${TLS_MODE:-disabled}
      AUTO_MIGRATE_ON_STARTUP: ${AUTO_MIGRATE_ON_STARTUP:-true}
    networks:
      - infra
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    pids_limit: 256
    mem_limit: 512m
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  # Attach to an existing external network that can reach MySQL.
  infra:
    external: true
    name: ${INFRA_NETWORK_NAME:-infra_default}

