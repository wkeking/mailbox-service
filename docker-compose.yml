# Single-host app deployment. MySQL is external: local mysql-host on infra_default.
#
# Prerequisites:
#   1. mysql-host is running (e.g. Soothe/infra compose) and joined to network infra_default
#   2. Create app database once (if missing):
#        docker exec -i mysql-host mysql -uroot -proot \
#          -e "CREATE DATABASE IF NOT EXISTS mailbox_service CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci;"
#   3. cp .env.example .env  # fill secrets
#      Compose 容器内 DATABASE_URL 主机名须为 mysql-host（勿用 127.0.0.1）
#
# Usage (after building/loading the image):
#   docker compose up -d

services:
  mailbox-service:
    image: ${MAILBOX_IMAGE:-registry.example.com/mailbox-service:latest}
    container_name: mailbox-service
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # 与 .env 共用 DATABASE_URL；未在 .env 配置时使用下面默认值（指向 mysql-host）。
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:root@mysql-host:3306/mailbox_service}
      APP_ENV: ${APP_ENV:-production}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    networks:
      - infra_default
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  infra_default:
    external: true
    name: infra_default
