# Example single-host deployment (ARM64 or AMD64, depending on the image you load).
# MySQL is external-friendly: override DATABASE_URL to point at an existing instance.
#
# Usage (after building/loading the image):
#   cp .env.example .env   # fill secrets
#   docker compose up -d

services:
  mailbox-service:
    image: ${MAILBOX_IMAGE:-mailbox-service:latest}
    container_name: mailbox-service
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Prefer the service hostname when using the bundled MySQL profile.
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://mailbox_service:mailbox_service@mysql:3306/mailbox_service}
      APP_ENV: ${APP_ENV:-production}
      # Comma-separated browser origins for the admin UI when it is not same-origin.
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: mailbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mailbox_service
      MYSQL_USER: mailbox_service
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mailbox_service}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-change-me}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mailbox_mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mailbox_mysql_data:
